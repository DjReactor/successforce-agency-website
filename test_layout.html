<!DOCTYPE html>
<html>
<head>
<style>
:root { --mono: monospace; }
body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 50px; }
.p-cur { font-size: clamp(22px, 1.8vw, 44px); font-weight: 700; color: #fff; padding-bottom: 5px; }
.p-amt { font-size: clamp(58px, 5.5vw, 120px); font-weight: 700; letter-spacing: -.03em; line-height: 1; }
.p-per { font-size: 16px; color: rgba(255,255,255,.5); padding-bottom: 10px; }
.p-ar { display: flex; align-items: flex-end; gap: 4px; margin-bottom: 6px; }
</style>
</head>
<body>
  <div style="display:flex;align-items:flex-start;gap:20px;margin-bottom:8px;flex-wrap:wrap">
    <div>
      <div style="font-family:var(--mono);font-size:10px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Custom AI Build</div>
      <div style="display:flex;align-items:flex-end;gap:2px">
        <span class="p-cur" style="font-size:16px;padding-bottom:3px">$</span>
        <span style="font-size:36px;font-weight:700;letter-spacing:-.04em;color:#fff;line-height:1">5,000</span>
      </div>
    </div>
    <div style="font-size:22px;color:rgba(255,255,255,.20);font-weight:300;padding-top:14px">+</div>
    <div>
      <div style="font-family:var(--mono);font-size:10px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Continuous Optimization</div>
      <div class="p-ar" style="margin-bottom:0">
        <span class="p-cur">$</span>
        <span class="p-amt">497</span>
        <span class="p-per">/month</span>
      </div>
    </div>
  </div>
</body>
</html>
